<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <script>
        async function loadMarkdown(file) {
            let response = await fetch(file);
            let text = await response.text();
            let converter = new showdown.Converter();
            document.getElementById("markdown-content").innerHTML = converter.makeHtml(text);
        }

        document.addEventListener("DOMContentLoaded", function() {
            let params = new URLSearchParams(window.location.search);
            if (params.has("file")) {
                loadMarkdown(params.get("file"));
            }
        });
    </script>
</head>
<body>
    <header>
        <h1>My Blog - Markdown Viewer</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="markdown.html?file=posts/Detecting_Virtual_Machines_and_Sandbox.md">About</a></li>
                <li><a href="markdown.html?file=contact.md">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <article id="markdown-content">
            <p>Loading content...</p>
        </article>
    </main>
    <footer>
        <p>&copy; 2025 My Cyber Security Blog</p>
    </footer>
</body>
</html>
