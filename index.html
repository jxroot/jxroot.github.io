<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ffcc;
            font-family: 'Arial', sans-serif;
        }
        .container {
            margin-top: 20px;
        }
        .post-preview img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .full-post img {
            width: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/" onclick="showPostList(); return false;">Cyber Blog</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="?post=about" onclick="loadPost('about'); return false;">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="?post=contact" onclick="loadPost('contact'); return false;">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="post-list" class="row"></div>
        <div id="post-content" class="full-post" style="display:none;"></div>
    </div>

    <footer class="bg-dark text-center text-white py-3 mt-5">
        <p>&copy; 2025 Cyber Security Blog. All rights reserved.</p>
    </footer>

    <script>
        let postsData = [];

        async function fetchPostList() {
            try {
                const response = await fetch('posts.json');
                if (!response.ok) throw new Error('Failed to load posts');
                postsData = await response.json();

                const postListContainer = document.getElementById('post-list');
                postListContainer.innerHTML = '';

                postsData.forEach(post => {
                    const postDiv = document.createElement('div');
                    postDiv.classList.add('col-md-4', 'mb-4');

                    postDiv.innerHTML = `
                        <div class="card bg-dark text-white">
                            <img src="${post.image}" class="card-img-top" alt="${post.title}">
                            <div class="card-body">
                                <h5 class="card-title">${post.title}</h5>
                                <p class="card-text">${post.summary}</p>
                                <a href="?post=${post.slug}" class="btn btn-primary" onclick="loadPost('${post.slug}'); return false;">Read More</a>
                            </div>
                        </div>
                    `;

                    postListContainer.appendChild(postDiv);
                });
            } catch (error) {
                console.error('Error fetching post list:', error);
            }
        }

        async function loadPost(slug) {
            let post = postsData.find(p => p.slug === slug);
            
            if (!post) {
                post = { url: `posts/${slug}.md`, image: `posts/${slug}.png`, title: slug };
            }

            history.pushState({}, "", `?post=${slug}`);
            await loadPage(post);
        }

        async function loadPage(post) {
            try {
                const response = await fetch(post.url);
                if (!response.ok) throw new Error('Failed to load content');
                const markdown = await response.text();

                const converter = new showdown.Converter();
                const postContent = document.getElementById('post-content');

                postContent.innerHTML = `<img src="${post.image}" alt="Post Image"><h1>${post.title}</h1>${converter.makeHtml(markdown)}`;
                document.getElementById('post-list').style.display = 'none';
                postContent.style.display = 'block';
            } catch (error) {
                console.error('Error loading content:', error);
            }
        }

        function showPostList() {
            document.getElementById('post-list').style.display = 'block';
            document.getElementById('post-content').style.display = 'none';
        }

        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            const postSlug = urlParams.get('post');

            if (postSlug) {
                loadPost(postSlug);
            } else {
                fetchPostList();
            }
        };

        window.onpopstate = function () {
            const urlParams = new URLSearchParams(window.location.search);
            const postSlug = urlParams.get('post');
            if (postSlug) {
                loadPost(postSlug);
            } else {
                showPostList();
            }
        };
    </script>

</body>
</html>
