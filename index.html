<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Blog</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ffcc;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
        }
        nav ul {
            list-style: none;
            padding: 0;
        }
        nav ul li {
            display: inline;
            margin-right: 15px;
        }
        nav ul li a {
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
        }
        .intro {
            text-align: center;
            margin-top: 50px;
        }
        .post-list {
            text-align: center;
            margin-top: 30px;
        }
        footer {
            background-color: #1a1a1a;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Cyber Security Insights</h1>
        <nav>
            <ul id="post-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section class="intro">
            <h2>Welcome to the Dark Side of Cyber Security</h2>
            <p>Stay updated with the latest trends, threats, and best practices in cyber security.</p>
        </section>
        <section class="post-list" id="posts">
            <h2>Latest Posts</h2>
            <ul id="posts-list"></ul>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2025 Cyber Security Blog. All rights reserved.</p>
    </footer>
    
    <script>
        async function fetchPostList() {
            try {
                const response = await fetch('posts/');
                if (!response.ok) throw new Error('Failed to fetch posts');
                const text = await response.text();
                const parser = new DOMParser();
                const htmlDoc = parser.parseFromString(text, 'text/html');
                const links = [...htmlDoc.querySelectorAll('a')]
                    .map(a => a.getAttribute('href'))
                    .filter(href => href.endsWith('.md'));
                
                const postList = document.getElementById('posts-list');
                links.forEach(link => {
                    const listItem = document.createElement('li');
                    const postLink = document.createElement('a');
                    postLink.href = `posts/${link}`;
                    postLink.textContent = link.replace('.md', '').replace(/[-_]/g, ' ');
                    listItem.appendChild(postLink);
                    postList.appendChild(listItem);
                });
            } catch (error) {
                console.error('Error fetching post list:', error);
            }
        }
        fetchPostList();
    </script>
</body>
</html>
