<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cyber Security Blog</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <script>
        async function loadMarkdown(file) {
            let response = await fetch(file);
            let text = await response.text();
            let converter = new showdown.Converter();
            document.getElementById("markdown-content").innerHTML = converter.makeHtml(text);
        }

        document.addEventListener("DOMContentLoaded", function() {
            let params = new URLSearchParams(window.location.search);
            if (params.has("file")) {
                loadMarkdown("posts/" + params.get("file"));
            }
        });
    </script>
    <style>
        :root {
            --primary-color: #00ffcc;
            --background-dark: #0a0a0a;
            --background-light: #ffffff;
            --text-dark: #00ffcc;
            --text-light: #333333;
        }
        body {
            background-color: var(--background-dark);
            color: var(--text-dark);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            transition: all 0.3s ease-in-out;
        }
        .light-mode {
            background-color: var(--background-light);
            color: var(--text-light);
        }
        header {
            background: #111;
            padding: 20px;
            text-align: center;
            box-shadow: 0px 4px 8px rgba(0, 255, 204, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        nav ul li {
            display: inline;
            margin: 0 15px;
        }
        nav ul li a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
        .theme-toggle {
            cursor: pointer;
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1.5em;
        }
        main {
            padding: 20px;
        }
        .posts article {
            background: #222;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-color);
            box-shadow: 0px 4px 10px rgba(0, 255, 204, 0.1);
        }
        .posts article h2 a {
            color: var(--primary-color);
            text-decoration: none;
        }
        footer {
            background: #111;
            text-align: center;
            padding: 15px;
            box-shadow: 0px -4px 8px rgba(0, 255, 204, 0.2);
        }
    </style>
</head>
<body>
    <header>
        <h1>My Cyber Security Blog</h1>
        <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="markdown.html?file=about.md">About</a></li>
                <li><a href="markdown.html?file=contact.md">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="posts">
            <article>
                <h2><a href="markdown.html?file=post1.md">First Blog Post</a></h2>
                <p>Published on: January 1, 2025</p>
                <p>A short excerpt from the first post...</p>
            </article>
            <article>
                <h2><a href="markdown.html?file=post2.md">Second Blog Post</a></h2>
                <p>Published on: February 1, 2025</p>
                <p>A short excerpt from the second post...</p>
            </article>
        </section>
        <article id="markdown-content">
            <p>Loading content...</p>
        </article>
    </main>
    <footer>
        <p>&copy; 2025 My Cyber Security Blog</p>
    </footer>
</body>
</html>
