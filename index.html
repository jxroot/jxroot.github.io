<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Blog</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ffcc;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
        }
        nav ul {
            list-style: none;
            padding: 0;
        }
        nav ul li {
            display: inline;
            margin-right: 15px;
        }
        nav ul li a {
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
        .post-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 8px;
        }
        .post-preview {
            background: #222;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            cursor: pointer;
        }
        .post-preview img {
            width: 100%;
            border-radius: 8px;
        }
        .post-preview h2 {
            color: #00ffcc;
        }
        .post-preview p {
            color: #ddd;
        }
        .post-preview .meta {
            font-size: 12px;
            color: #888;
        }
        .full-post {
            display: none;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 8px;
            max-width: 800px;
            margin: 30px auto;
            color: #ddd;
        }
        pre {
            background: #222;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        code {
            color: #ffcc00;
        }
        img {
            max-width: 100%;
            border-radius: 8px;
        }
        footer {
            background-color: #1a1a1a;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Cyber Security Insights</h1>
        <nav>
            <ul>
                <li><a href="#" onclick="showPostList()">Home</a></li>
                <li><a href="#" onclick="loadPage('posts/about.md')">About</a></li>
                <li><a href="#" onclick="loadPage('posts/contact.md')">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="post-list" class="post-container"></div>
        <div id="post-content" class="full-post"></div>
    </main>

    <footer>
        <p>&copy; 2025 Cyber Security Blog. All rights reserved.</p>
    </footer>

    <script>
        async function fetchPostList() {
            try {
                const response = await fetch('posts.json');
                if (!response.ok) throw new Error('Failed to load posts');
                const posts = await response.json();
                
                const postListContainer = document.getElementById('post-list');
                postListContainer.innerHTML = '';
                
                posts.forEach(post => {
                    const postDiv = document.createElement('div');
                    postDiv.classList.add('post-preview');
                    postDiv.innerHTML = `
                        <img src="${post.image}" alt="${post.title}">
                        <h2>${post.title}</h2>
                        <p>${post.summary}</p>
                        <p class="meta">#${post.tags.join(" #")} | 📅 ${post.date} | ⏳ ${post.read_time} | ✍ ${post.author}</p>
                    `;
                    postDiv.onclick = () => loadPost(post.url);
                    postListContainer.appendChild(postDiv);
                });
            } catch (error) {
                console.error('Error fetching post list:', error);
            }
        }

        async function loadPost(url) {
            await loadPage(url);
        }

        async function loadPage(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to load content');
                const markdown = await response.text();
                
                const converter = new showdown.Converter({
                    tables: true,
                    tasklists: true,
                    simplifiedAutoLink: true,
                    parseImgDimensions: true,
                    strikethrough: true,
                    ghCodeBlocks: true
                });
                
                document.getElementById('post-content').innerHTML = converter.makeHtml(markdown);
                
                document.getElementById('post-list').style.display = 'none';
                document.getElementById('post-content').style.display = 'block';
            } catch (error) {
                console.error('Error loading content:', error);
            }
        }

        function showPostList() {
            document.getElementById('post-list').style.display = 'block';
            document.getElementById('post-content').style.display = 'none';
        }

        fetchPostList();
    </script>
</body>
</html>
