<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Blog</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ffcc;
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
        }
        nav ul {
            list-style: none;
            padding: 0;
        }
        nav ul li {
            display: inline;
            margin-right: 15px;
        }
        nav ul li a {
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
        .post-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 8px;
        }
        .post-preview {
            background: #222;
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 8px;
            cursor: pointer;
        }
        .post-preview img {
            width: 100%;
            border-radius: 8px;
        }
        .post-preview h2 {
            color: #00ffcc;
        }
        .post-preview p {
            color: #ddd;
        }
        .post-preview .meta {
            font-size: 12px;
            color: #888;
        }
        .full-post {
            display: none;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 8px;
            max-width: 800px;
            margin: 30px auto;
            color: #ddd;
        }
        footer {
            background-color: #1a1a1a;
            text-align: center;
            padding: 20px;
            position: relative;
            margin-top: 30px;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Cyber Security Insights</h1>
        <nav>
            <ul>
                <li><a href="/" onclick="showPostList()">Home</a></li>
                <li><a href="/posts/about" onclick="loadPost('about')">About</a></li>
                <li><a href="/posts/contact" onclick="loadPost('contact')">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="post-list" class="post-container"></div>
        <div id="post-content" class="full-post"></div>
    </main>

    <footer>
        <p>&copy; 2025 Cyber Security Blog. All rights reserved.</p>
    </footer>

    <script>
        let postsData = [];

        async function fetchPostList() {
            try {
                const response = await fetch('posts.json');
                if (!response.ok) throw new Error('Failed to load posts');
                postsData = await response.json();
                
                const postListContainer = document.getElementById('post-list');
                postListContainer.innerHTML = '';
                
                postsData.forEach(post => {
                    const postDiv = document.createElement('div');
                    postDiv.classList.add('post-preview');
                    postDiv.innerHTML = `
                        <img src="${post.image}" alt="${post.title}">
                        <h2>${post.title}</h2>
                        <p>${post.summary}</p>
                        <p class="meta">#${post.tags.join(" #")} | 📅 ${post.date} | ⏳ ${post.read_time} | ✍ ${post.author}</p>
                    `;
                    postDiv.onclick = () => loadPost(post.slug); // ✅ Fix: Pass correct slug
                    postListContainer.appendChild(postDiv);
                });
            } catch (error) {
                console.error('Error fetching post list:', error);
            }
        }

        async function loadPost(slug) {
            const post = postsData.find(p => p.slug === slug);
            if (!post) {
                console.error(`Post not found: ${slug}`);
                return;
            }

            history.pushState({ post: slug }, post.title, `/posts/${slug}`);
            await loadPage(post);
        }

        async function loadPage(post) {
            try {
                const response = await fetch(post.url);
                if (!response.ok) throw new Error('Failed to load content');
                const markdown = await response.text();
                
                const converter = new showdown.Converter();
                
                const postContent = document.getElementById('post-content');
                postContent.innerHTML = `<img src="${post.image}" alt="Post Image">${converter.makeHtml(markdown)}`;

                document.getElementById('post-list').style.display = 'none';
                document.getElementById('post-content').style.display = 'block';
            } catch (error) {
                console.error('Error loading content:', error);
            }
        }

        window.onload = function () {
            const pathParts = window.location.pathname.split("/posts/");
            const postSlug = pathParts.length > 1 ? pathParts[1] : null;

            if (postSlug) {
                loadPost(postSlug);
            } else {
                fetchPostList();
            }
        };
    </script>
</body>
</html>
