<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const postsContainer = document.getElementById("posts");
            const postContainer = document.getElementById("post");
            
            async function loadPosts() {
                const response = await fetch("posts.json");
                const posts = await response.json();
                postsContainer.innerHTML = posts.map(post => `
                    <div class="post-preview">
                        <img src="${post.image}" alt="Post Image" style="width: 100%; max-height: 200px; object-fit: cover;">
                        <h2>${post.title}</h2>
                        <p>${post.summary}</p>
                        <p><strong>Author:</strong> ${post.author} | <strong>Date:</strong> ${post.date} | <strong>Read Time:</strong> ${post.read_time}</p>
                        <p><strong>Tags:</strong> ${post.tags.join(", ")}</p>
                        <a href="#/posts/${post.url}" class="read-more" data-url="${post.url}">Show Full Info</a>
                    </div>
                `).join("\n");
            }
            
            async function loadMarkdownFile(filePath) {
                try {
                    const response = await fetch(filePath);
                    if (!response.ok) throw new Error("File not found");
                    const text = await response.text();
                    postContainer.innerHTML = marked.parse(text) + '<br><a href="#/">Back to Posts</a>';
                } catch (error) {
                    postContainer.innerHTML = "<h2>Post not found</h2>";
                }
            }
            
            async function router() {
                const hash = location.hash;
                if (hash.startsWith("#/posts/")) {
                    const postUrl = hash.split("#/posts/")[1];
                    postsContainer.style.display = "none";
                    postContainer.style.display = "block";
                    loadMarkdownFile(postUrl);
                } else {
                    postsContainer.style.display = "block";
                    postContainer.style.display = "none";
                    loadPosts();
                }
            }
            
            window.addEventListener("hashchange", router);
            router();
        });
    </script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #222; color: white; }
        .post-preview { border-bottom: 1px solid #444; padding: 10px 0; }
        .post-preview img { display: block; margin-bottom: 10px; }
        .read-more { color: lightblue; text-decoration: none; }
        a { color: lightblue; }
    </style>
</head>
<body>
    <h1>My Blog</h1>
    <div id="posts"></div>
    <div id="post" style="display: none;"></div>
</body>
</html>
